<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --night: #1b1f3b;
            --night-2: #2a2f55;
            --dawn: #f2a65a;
            --dawn-soft: #f7d9b5;
            --sage: #6b9080;
            --paper: #fbf7f0;
            --ink: #22252f;
            --ink-soft: #5a5f71;
        }

        body {
            font-family: "Manrope", sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.85;
        }

        .hero {
            position: relative;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 8vh 6vw;
            background: linear-gradient(180deg,
                    #10132a 0%,
                    var(--night) 55%,
                    var(--night-2) 100%);
            color: #f4eee0;
            overflow: hidden;
        }

        /* stars */
        .stars {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation-name: twinkle;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        /* Individual stars */

        .star:nth-child(1) {
            top: 12%;
            left: 8%;
            width: 2px;
            height: 2px;
            animation-duration: 1.7s;
            animation-delay: -0.2s;
        }

        .star:nth-child(2) {
            top: 20%;
            left: 25%;
            width: 3px;
            height: 3px;
            animation-duration: 2.4s;
            animation-delay: -1.3s;
        }

        .star:nth-child(3) {
            top: 15%;
            left: 82%;
            width: 2px;
            height: 2px;
            animation-duration: 1.2s;
            animation-delay: -0.8s;
        }

        .star:nth-child(4) {
            top: 35%;
            left: 60%;
            width: 4px;
            height: 4px;
            animation-duration: 2.8s;
            animation-delay: -2s;
        }

        .star:nth-child(5) {
            top: 42%;
            left: 18%;
            width: 2px;
            height: 2px;
            animation-duration: 1.9s;
            animation-delay: -0.4s;
        }

        .star:nth-child(6) {
            top: 52%;
            left: 75%;
            width: 3px;
            height: 3px;
            animation-duration: 2.2s;
            animation-delay: -1.1s;
        }

        .star:nth-child(7) {
            top: 63%;
            left: 30%;
            width: 2px;
            height: 2px;
            animation-duration: 1.5s;
            animation-delay: -0.6s;
        }

        .star:nth-child(8) {
            top: 70%;
            left: 88%;
            width: 3px;
            height: 3px;
            animation-duration: 2.7s;
            animation-delay: -1.7s;
        }

        .star:nth-child(9) {
            top: 78%;
            left: 12%;
            width: 4px;
            height: 4px;
            animation-duration: 1.8s;
            animation-delay: -0.3s;
        }

        .star:nth-child(10) {
            top: 84%;
            left: 50%;
            width: 2px;
            height: 2px;
            animation-duration: 2.5s;
            animation-delay: -1.4s;
        }

        .star:nth-child(11) {
            top: 90%;
            left: 70%;
            width: 3px;
            height: 3px;
            animation-duration: 1.3s;
            animation-delay: -0.7s;
        }

        .star:nth-child(12) {
            top: 28%;
            left: 45%;
            width: 2px;
            height: 2px;
            animation-duration: 2.1s;
            animation-delay: -1.9s;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.15;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.3);
            }

            100% {
                opacity: 0.25;
                transform: scale(1);
            }
        }

        .code {
            position: relative;
            z-index: 1;
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: clamp(4.5rem, 16vw, 9rem);
            line-height: 1;
            background: linear-gradient(90deg, #F4EEE0, var(--dawn-soft));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            position: relative;
            z-index: 1;
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            margin-top: .6rem;
        }

        p {
            position: relative;
            z-index: 1;
            max-width: 46ch;
            margin: 1.1rem auto 2.2rem;
            color: #D9D6E8;
            font-size: 1.05rem;
        }

        .actions {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: .9rem;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .85rem 1.7rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: .95rem;
            text-decoration: none;
            background: var(--dawn);
            color: #201205;
            box-shadow: 0 8px 30px -10px rgba(242, 166, 90, .6);
            transition: transform .2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
